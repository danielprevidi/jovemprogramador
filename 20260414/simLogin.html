<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
    </style>
</head>
<body>
   <div class="container">
        <h2>LOGIN</h2>
        <input id="usuario" placeholder="Usuário" />
        <input id="senha" type="password" placeholder="Senha" />
        <button onclick="logar()">Entrar</button>
        <p id="mensagem"></p>
    </div>

    <script>
        // usuários cadastrados "temporariamente"
        let usuarios = [
            { usuario: "admin",  senha: "1234" },
            { usuario: "Joao",   senha: "abcd" },
            { usuario: "maria",  senha: "5678" }
        ];

        function logar() {
            let usuario = document.getElementById("usuario").value;
            let senha   = document.getElementById("senha").value;
            let mensagem = document.getElementById("mensagem");

            let encontrado = usuarios.find(u => u.usuario === usuario && u.senha === senha);

            if (encontrado) {
                mensagem.style.color = "green";
                mensagem.innerHTML = "Login realizado com sucesso! Bem vindo " + usuario;
            } else {
                mensagem.style.color = "red";
                mensagem.innerHTML = "Usuário ou senha incorretos!";
            }
        }
    </script>

</body>
</html>
